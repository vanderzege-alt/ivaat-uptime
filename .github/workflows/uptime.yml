name: Uptime CI
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    name: Check n8n gate.ivaat.com

    steps:
      - name: Check healthcheck endpoint
        id: health
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            --max-time 10 \
            https://gate.ivaat.com/webhook/healthcheck)
          BODY=$(cat /tmp/response.json 2>/dev/null || echo "")
          echo "status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          echo "HTTP Status: $HTTP_STATUS"
          echo "Body: $BODY"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "FAIL: got $HTTP_STATUS"
            exit 1
          fi
          echo "OK: n8n is up"

      - name: Send Telegram alert on DOWNTIME
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": \"🔴 n8n DOWNTIME\\ngate.ivaat.com не отвечает!\\n\\nGitHub Actions: https://github.com/vanderzege-alt/ivaat-uptime/actions\", \"parse_mode\": \"HTML\"}"
